<div class="confirmation-dialog" [attr.data-type]="config.type">
  <div class="dialog-icon">
    <mat-icon>{{ config.icon }}</mat-icon>
  </div>

  <h2 mat-dialog-title class="dialog-title">{{ data.title }}</h2>

  <mat-dialog-content class="dialog-content">
    <p class="dialog-message">{{ data.message }}</p>
  </mat-dialog-content>

  <mat-dialog-actions
    class="dialog-actions"
    [class.dialog-actions--single]="config.hideCancelButton"
  >
    @if (!config.hideCancelButton) {
    <button
      mat-button
      class="cancel-button"
      (click)="onCancel()"
      cdkFocusInitial
    >
      {{ config.cancelText }}
    </button>
    } @if (config.hideCancelButton) {
    <button
      mat-flat-button
      [class]="'confirm-button confirm-button--' + config.confirmButtonColor"
      (click)="onConfirm()"
      cdkFocusInitial
    >
      {{ config.confirmText }}
    </button>
    } @else {
    <button
      mat-flat-button
      [class]="'confirm-button confirm-button--' + config.confirmButtonColor"
      (click)="onConfirm()"
    >
      {{ config.confirmText }}
    </button>
    }
  </mat-dialog-actions>
</div>
